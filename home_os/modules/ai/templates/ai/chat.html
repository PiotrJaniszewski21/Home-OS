{% extends "base.html" %}
{% block title %}AI Assistant — Home OS{% endblock %}
{% block content %}
<div class="max-w-3xl mx-auto flex flex-col" style="height: calc(100vh - 10rem);">
    <div class="flex items-center justify-between mb-4">
        <div>
            <h1>AI Assistant</h1>
        </div>
        <a href="{{ url_for('ai.settings') }}" class="btn btn-ghost" style="font-size: 12px;">
            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>
            Settings
        </a>
    </div>

    <div id="messages" class="flex-1 overflow-y-auto space-y-4 mb-4" style="padding: 1rem 0.5rem;">
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 0.75rem; opacity: 0.5;">
            <svg width="40" height="40" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="color: var(--text-tertiary);"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
            <p class="text-tertiary text-sm">Ask about your files, storage, or system.</p>
        </div>
    </div>

    <div style="display: flex; gap: 0.5rem; align-items: stretch;">
        <input type="text" id="input" placeholder="Ask something..." class="glass-input flex-1" style="padding: 0.75rem 1rem; font-size: 14px;" onkeydown="if(event.key==='Enter')sendMessage()">
        <button onclick="sendMessage()" id="send-btn" class="btn btn-primary" style="padding: 0.75rem 1.25rem;">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19V5m0 0l-7 7m7-7l7 7"/></svg>
        </button>
    </div>
</div>

<script>
const CSRF = "{{ csrf_token() }}";
let history = [];

function addMessage(role, content) {
    const container = document.getElementById("messages");
    const placeholder = container.querySelector("[style*='height: 100%']");
    if (placeholder) placeholder.remove();

    const div = document.createElement("div");
    div.style.display = "flex";
    div.style.justifyContent = role === "user" ? "flex-end" : "flex-start";
    div.style.animation = "fadeIn 0.2s var(--ease-out)";

    const bubble = document.createElement("div");
    bubble.className = role === "user" ? "chat-bubble-user" : "chat-bubble-assistant";
    bubble.textContent = content;

    div.appendChild(bubble);
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function setLoading(on) {
    document.getElementById("send-btn").disabled = on;
    document.getElementById("input").disabled = on;
    if (on) {
        addMessage("assistant", "Thinking...");
    }
}

function removeLoading() {
    const container = document.getElementById("messages");
    const last = container.lastElementChild;
    if (last && last.textContent === "Thinking...") {
        last.remove();
    }
}

function sendMessage() {
    const input = document.getElementById("input");
    const message = input.value.trim();
    if (!message) return;

    input.value = "";
    addMessage("user", message);
    setLoading(true);

    fetch("/api/ai/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json", "X-CSRFToken": CSRF},
        body: JSON.stringify({message, history})
    })
    .then(r => r.json())
    .then(r => {
        removeLoading();
        if (r.ok) {
            addMessage("assistant", r.data.response);
            history.push({role: "user", content: message});
            history.push({role: "assistant", content: r.data.response});
            if (history.length > 20) history = history.slice(-20);
        } else {
            addMessage("assistant", "Error: " + (r.error || "Something went wrong"));
        }
    })
    .catch(e => {
        removeLoading();
        addMessage("assistant", "Error: Could not reach the server");
    })
    .finally(() => {
        document.getElementById("send-btn").disabled = false;
        document.getElementById("input").disabled = false;
        document.getElementById("input").focus();
    });
}
</script>
{% endblock %}
