{% extends "base.html" %}
{% block title %}Calendar — Home OS{% endblock %}
{% block content %}
<div class="max-w-5xl">
    <div class="flex items-center justify-between mb-6">
        <h1>Calendar</h1>
        <button onclick="openNewEvent()" class="btn btn-ghost">+ New Event</button>
    </div>

    <!-- Month navigation -->
    <div class="flex items-center justify-between mb-4">
        <button onclick="changeMonth(-1)" class="btn btn-ghost" style="padding:0.4rem 0.75rem;">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </button>
        <h2 id="month-title" style="font-size:1.125rem;"></h2>
        <button onclick="changeMonth(1)" class="btn btn-ghost" style="padding:0.4rem 0.75rem;">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        </button>
    </div>

    <!-- Calendar grid -->
    <div class="glass-panel" style="padding:0; overflow:hidden;">
        <div class="cal-header">
            <span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
    </div>

    <!-- Upcoming bills summary -->
    <div class="glass-card mt-6" id="bills-summary" style="display:none;">
        <h3 class="mb-3 text-secondary text-xs" style="text-transform:uppercase; letter-spacing:0.06em;">Upcoming Bills</h3>
        <div id="bills-list"></div>
    </div>
</div>

<!-- New/Edit Event Modal -->
<div id="event-modal" class="modal-backdrop hidden" onclick="if(event.target===this)closeModal()">
    <div class="modal-content" style="max-width:28rem;">
        <h3 id="modal-title" style="margin-bottom:1rem;">New Event</h3>
        <form id="event-form" class="space-y-4">
            <input type="hidden" id="event-id">

            <div>
                <label class="text-secondary text-xs" style="display:block; margin-bottom:0.25rem;">Title</label>
                <input type="text" id="ev-title" class="glass-input" required>
            </div>

            <div class="flex gap-3">
                <div style="flex:1;">
                    <label class="text-secondary text-xs" style="display:block; margin-bottom:0.25rem;">Type</label>
                    <select id="ev-type" class="glass-input" onchange="toggleTypeFields()">
                        <option value="event">Event</option>
                        <option value="bill">Bill (recurring)</option>
                        <option value="payment">Payment (one-off)</option>
                        <option value="income">Income (one-off)</option>
                        <option value="work">Work Hours</option>
                        <option value="holiday">Holiday</option>
                    </select>
                </div>
                <div style="flex:1;" id="date-field">
                    <label class="text-secondary text-xs" style="display:block; margin-bottom:0.25rem;">Date</label>
                    <input type="date" id="ev-date" class="glass-input" required>
                </div>
            </div>

            <!-- Holiday date range -->
            <div id="holiday-fields" style="display:none;">
                <div class="flex gap-3">
                    <div style="flex:1;">
                        <label class="text-secondary text-xs" style="display:block; margin-bottom:0.25rem;">From</label>
                        <input type="date" id="ev-holiday-from" class="glass-input">
                    </div>
                    <div style="flex:0 0 auto; display:flex; align-items:flex-end; padding-bottom:0.5rem;">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="opacity:0.4;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
                    </div>
                    <div style="flex:1;">
                        <label class="text-secondary text-xs" style="display:block; margin-bottom:0.25rem;">To</label>
                        <input type="date" id="ev-holiday-to" class="glass-input">
                    </div>
                </div>
            </div>

            <div id="time-field">
                <label class="text-secondary text-xs" style="display:block; margin-bottom:0.25rem;">Time (optional)</label>
                <input type="time" id="ev-time" class="glass-input">
            </div>
            <input type="hidden" id="ev-color" value="#0a84ff">

            <!-- Bill fields -->
            <div id="bill-fields" class="space-y-4" style="display:none;">
                <div class="flex gap-3">
                    <div style="flex:1;">
                        <label class="text-secondary text-xs" style="display:block; margin-bottom:0.25rem;">Amount</label>
                        <input type="number" id="ev-amount" class="glass-input" step="0.01" placeholder="0.00">
                    </div>
                    <div style="flex:1;">
                        <label class="text-secondary text-xs" style="display:block; margin-bottom:0.25rem;">Currency</label>
                        <select id="ev-currency" class="glass-input">
                            <option value="GBP">£ GBP</option>
                            <option value="USD">$ USD</option>
                            <option value="EUR">€ EUR</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Work fields -->
            <div id="work-fields" style="display:none;">
                <label class="text-secondary text-xs" style="display:block; margin-bottom:0.25rem;">Hours</label>
                <input type="number" id="ev-hours" class="glass-input" step="0.5" placeholder="8">
            </div>

            <!-- Recurring (hidden for bills — they're always recurring) -->
            <div id="recurring-section" class="flex items-center gap-3">
                <label class="flex items-center gap-2 text-sm text-secondary" style="cursor:pointer;">
                    <input type="checkbox" id="ev-recurring" onchange="toggleRecurrence()">
                    Recurring
                </label>
                <select id="ev-recurrence" class="glass-input" style="display:none; width:auto;">
                    <option value="weekly">Weekly</option>
                    <option value="monthly">Monthly</option>
                    <option value="yearly">Yearly</option>
                </select>
            </div>

            <!-- Bill frequency (shown instead of recurring checkbox for bills) -->
            <div id="bill-frequency" style="display:none;">
                <label class="text-secondary text-xs" style="display:block; margin-bottom:0.25rem;">Frequency</label>
                <select id="ev-bill-freq" class="glass-input">
                    <option value="weekly">Weekly</option>
                    <option value="monthly" selected>Monthly</option>
                    <option value="yearly">Yearly</option>
                </select>
            </div>

            <div>
                <label class="text-secondary text-xs" style="display:block; margin-bottom:0.25rem;">Notes</label>
                <input type="text" id="ev-desc" class="glass-input" placeholder="Optional">
            </div>

            <div class="flex justify-between" style="padding-top:0.5rem;">
                <button type="button" id="delete-btn" onclick="deleteEvent()" class="btn btn-danger" style="display:none;">Delete</button>
                <div class="flex gap-3 ml-auto">
                    <button type="button" onclick="closeModal()" class="btn btn-ghost">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </div>
        </form>
    </div>
</div>

<style>
.cal-header {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    padding: 0.6rem 0;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    border-bottom: 0.5px solid var(--border-divider);
}

.cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    min-height: 480px;
}

.cal-day {
    min-height: 72px;
    padding: 4px;
    border-right: 0.5px solid rgba(0, 60, 140, 0.04);
    border-bottom: 0.5px solid rgba(0, 60, 140, 0.04);
    cursor: pointer;
    transition: background var(--duration-fast) var(--ease-out);
}
.cal-day:nth-child(7n) { border-right: none; }
.cal-day:hover { background: var(--accent-light); }
.cal-day.today { background: rgba(0, 122, 255, 0.04); }
.cal-day.other-month { opacity: 0.3; }

.cal-day-num {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-primary);
    padding: 2px 4px;
}
.cal-day.today .cal-day-num {
    background: var(--accent);
    color: white;
    border-radius: 50%;
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
}

.cal-event {
    font-size: 10px;
    padding: 1px 5px;
    margin-top: 2px;
    border-radius: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
    color: white;
    font-weight: 500;
    letter-spacing: -0.01em;
}

.cal-event.type-bill { background: #ef4444; }
.cal-event.type-payment { background: #ef4444; }
.cal-event.type-income { background: #10b981; }
.cal-event.type-event { background: #0a84ff; }
.cal-event.type-work { background: #0a84ff; }
.cal-event.type-holiday { background: #06b6d4; }
.cal-event.paid { opacity: 0.5; text-decoration: line-through; }

.bill-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.5rem 0;
    border-bottom: 0.5px solid rgba(0, 60, 140, 0.04);
    font-size: 13px;
}
.bill-row:last-child { border-bottom: none; }
</style>

<script nonce="{{ g.csp_nonce }}">
const CSRF = "{{ csrf_token() }}";
let currentYear = {{ year }};
let currentMonth = {{ month }};
let events = [];

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function init() {
    renderCalendar();
    loadEvents();
}

function changeMonth(dir) {
    currentMonth += dir;
    if (currentMonth > 12) { currentMonth = 1; currentYear++; }
    if (currentMonth < 1) { currentMonth = 12; currentYear--; }
    renderCalendar();
    loadEvents();
}

function renderCalendar() {
    document.getElementById("month-title").textContent = `${MONTHS[currentMonth-1]} ${currentYear}`;

    const grid = document.getElementById("cal-grid");
    grid.innerHTML = "";

    const firstDay = new Date(currentYear, currentMonth - 1, 1);
    let startDay = firstDay.getDay() - 1;
    if (startDay < 0) startDay = 6;

    const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
    const daysInPrev = new Date(currentYear, currentMonth - 1, 0).getDate();

    const today = new Date();
    const todayStr = today.toISOString().split("T")[0];

    // Previous month days
    for (let i = startDay - 1; i >= 0; i--) {
        const day = daysInPrev - i;
        const d = makeDay(day, true);
        grid.appendChild(d);
    }

    // Current month days
    for (let i = 1; i <= daysInMonth; i++) {
        const dateStr = `${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
        const d = makeDay(i, false, dateStr === todayStr, dateStr);
        grid.appendChild(d);
    }

    // Next month fill
    const totalCells = grid.children.length;
    const remaining = 42 - totalCells;
    for (let i = 1; i <= remaining; i++) {
        const d = makeDay(i, true);
        grid.appendChild(d);
    }
}

function makeDay(num, otherMonth, isToday, dateStr) {
    const div = document.createElement("div");
    div.className = "cal-day" + (otherMonth ? " other-month" : "") + (isToday ? " today" : "");
    if (dateStr) {
        div.dataset.date = dateStr;
        div.onclick = () => openNewEvent(dateStr);
    }

    const numEl = document.createElement("div");
    numEl.className = "cal-day-num";
    numEl.textContent = num;
    div.appendChild(numEl);

    return div;
}

function loadEvents() {
    const start = `${currentYear}-${String(currentMonth).padStart(2,'0')}-01`;
    const lastDay = new Date(currentYear, currentMonth, 0).getDate();
    const end = `${currentYear}-${String(currentMonth).padStart(2,'0')}-${lastDay}`;

    fetch(`/api/calendar/events?start=${start}&end=${end}`, {headers:{"X-CSRFToken": CSRF}})
        .then(r => r.json())
        .then(r => {
            if (r.ok) {
                events = r.data;
                placeEvents();
                loadBills();
            }
        });
}

function placeEvents() {
    document.querySelectorAll(".cal-event").forEach(e => e.remove());
    events.forEach(ev => {
        // Holidays span multiple days
        if (ev.event_type === "holiday" && ev.end_date) {
            const from = new Date(ev.date + "T00:00:00");
            const to = new Date(ev.end_date + "T00:00:00");
            for (let d = new Date(from); d <= to; d.setDate(d.getDate() + 1)) {
                const dateStr = d.toISOString().split("T")[0];
                const cell = document.querySelector(`.cal-day[data-date="${dateStr}"]`);
                if (!cell) continue;
                const el = document.createElement("div");
                el.className = "cal-event type-holiday";
                el.textContent = ev.title;
                el.onclick = (e) => { e.stopPropagation(); openEditEvent(ev); };
                cell.appendChild(el);
            }
            return;
        }

        const cell = document.querySelector(`.cal-day[data-date="${ev.date}"]`);
        if (!cell) return;

        const el = document.createElement("div");
        el.className = `cal-event type-${ev.event_type}` + (ev.is_paid ? " paid" : "");
        el.textContent = ev.event_type === "bill" || ev.event_type === "payment" ? `${getCurrencySymbol(ev.currency)}${ev.amount || ''} ${ev.title}` : ev.title;
        el.onclick = (e) => { e.stopPropagation(); openEditEvent(ev); };
        cell.appendChild(el);
    });
}

function loadBills() {
    const start = `${currentYear}-${String(currentMonth).padStart(2,'0')}-01`;
    const lastDay = new Date(currentYear, currentMonth, 0).getDate();
    const end = `${currentYear}-${String(currentMonth).padStart(2,'0')}-${lastDay}`;

    fetch(`/api/calendar/bills?start=${start}&end=${end}`, {headers:{"X-CSRFToken": CSRF}})
        .then(r => r.json())
        .then(r => {
            const container = document.getElementById("bills-summary");
            const list = document.getElementById("bills-list");
            const unpaid = r.ok ? r.data.filter(b => !b.is_paid) : [];
            if (unpaid.length > 0) {
                container.style.display = "block";
                list.innerHTML = unpaid.slice(0, 5).map(b => `
                    <div class="bill-row">
                        <div>
                            <span style="font-weight:500;">${b.title}</span>
                            <span class="text-tertiary text-xs" style="margin-left:0.5rem;">${b.date}</span>
                        </div>
                        <div style="font-weight:600;">${getCurrencySymbol(b.currency)}${b.amount ? b.amount.toFixed(2) : '—'}</div>
                    </div>
                `).join("");
            } else {
                container.style.display = "none";
            }
        });
}

function getCurrencySymbol(code) {
    return {GBP:'£', USD:'$', EUR:'€'}[code] || code + ' ';
}

// Modal
function openNewEvent(dateStr) {
    document.getElementById("modal-title").textContent = "New Event";
    document.getElementById("event-id").value = "";
    document.getElementById("ev-title").value = "";
    document.getElementById("ev-type").value = "event";
    document.getElementById("ev-date").value = dateStr || new Date().toISOString().split("T")[0];
    document.getElementById("ev-holiday-from").value = dateStr || new Date().toISOString().split("T")[0];
    document.getElementById("ev-holiday-to").value = "";
    document.getElementById("ev-time").value = "";
    document.getElementById("ev-color").value = "#0a84ff";
    document.getElementById("ev-amount").value = "";
    document.getElementById("ev-currency").value = "GBP";
    document.getElementById("ev-hours").value = "";
    document.getElementById("ev-recurring").checked = false;
    document.getElementById("ev-recurrence").style.display = "none";
    document.getElementById("ev-desc").value = "";
    document.getElementById("delete-btn").style.display = "none";
    toggleTypeFields();
    document.getElementById("event-modal").classList.remove("hidden");
}

function openEditEvent(ev) {
    const isInstance = String(ev.id).includes("_r_");
    const realId = isInstance ? ev.id.split("_r_")[0] : ev.id;

    document.getElementById("modal-title").textContent = "Edit Event";
    document.getElementById("event-id").value = realId;
    document.getElementById("ev-title").value = ev.title;
    document.getElementById("ev-type").value = ev.event_type;
    document.getElementById("ev-date").value = ev.date;
    document.getElementById("ev-holiday-from").value = ev.date;
    document.getElementById("ev-holiday-to").value = ev.end_date || "";
    document.getElementById("ev-time").value = ev.time || "";
    document.getElementById("ev-color").value = ev.color || "#0a84ff";
    document.getElementById("ev-amount").value = ev.amount || "";
    document.getElementById("ev-currency").value = ev.currency || "GBP";
    document.getElementById("ev-hours").value = ev.hours || "";
    document.getElementById("ev-recurring").checked = ev.is_recurring;
    document.getElementById("ev-recurrence").value = ev.recurrence || "monthly";
    document.getElementById("ev-recurrence").style.display = ev.is_recurring ? "" : "none";
    document.getElementById("ev-desc").value = ev.description || "";
    document.getElementById("delete-btn").style.display = isInstance ? "none" : "";
    toggleTypeFields();
    document.getElementById("event-modal").classList.remove("hidden");
}

function closeModal() {
    document.getElementById("event-modal").classList.add("hidden");
}

function toggleTypeFields() {
    const type = document.getElementById("ev-type").value;
    const isHoliday = type === "holiday";
    const hasAmount = ["bill", "payment", "income"].includes(type);
    document.getElementById("bill-fields").style.display = hasAmount ? "" : "none";
    document.getElementById("work-fields").style.display = type === "work" ? "" : "none";
    document.getElementById("recurring-section").style.display = (type === "bill" || type === "payment" || type === "income" || isHoliday) ? "none" : "";
    document.getElementById("bill-frequency").style.display = type === "bill" ? "" : "none";
    document.getElementById("holiday-fields").style.display = isHoliday ? "" : "none";
    document.getElementById("date-field").style.display = isHoliday ? "none" : "";
    document.getElementById("time-field").style.display = isHoliday ? "none" : "";
    document.getElementById("ev-date").required = !isHoliday;
}

function toggleRecurrence() {
    document.getElementById("ev-recurrence").style.display = document.getElementById("ev-recurring").checked ? "" : "none";
}

function deleteEvent() {
    const id = document.getElementById("event-id").value;
    if (!id || !confirm("Delete this event?")) return;
    fetch(`/api/calendar/events/${id}`, {method:"DELETE", headers:{"X-CSRFToken":CSRF}})
        .then(r => r.json())
        .then(r => { if(r.ok) { closeModal(); loadEvents(); }});
}

document.getElementById("event-form").onsubmit = function(e) {
    e.preventDefault();
    const id = document.getElementById("event-id").value;
    const evType = document.getElementById("ev-type").value;
    const isBill = evType === "bill";
    const isHoliday = evType === "holiday";

    const eventDate = isHoliday
        ? document.getElementById("ev-holiday-from").value
        : document.getElementById("ev-date").value;
    const endDate = isHoliday
        ? (document.getElementById("ev-holiday-to").value || null)
        : null;

    const body = {
        title: document.getElementById("ev-title").value,
        event_type: evType,
        date: eventDate,
        end_date: endDate,
        time: isHoliday ? null : (document.getElementById("ev-time").value || null),
        color: document.getElementById("ev-color").value,
        amount: parseFloat(document.getElementById("ev-amount").value) || null,
        currency: document.getElementById("ev-currency").value,
        hours: parseFloat(document.getElementById("ev-hours").value) || null,
        is_recurring: isBill ? true : document.getElementById("ev-recurring").checked,
        recurrence: isBill ? document.getElementById("ev-bill-freq").value : (document.getElementById("ev-recurring").checked ? document.getElementById("ev-recurrence").value : null),
        description: document.getElementById("ev-desc").value || null,
        all_day: isHoliday ? true : !document.getElementById("ev-time").value,
    };

    const url = id ? `/api/calendar/events/${id}` : "/api/calendar/events";
    const method = id ? "PUT" : "POST";

    fetch(url, {
        method,
        headers: {"Content-Type":"application/json", "X-CSRFToken": CSRF},
        body: JSON.stringify(body)
    }).then(r => r.json()).then(r => {
        if(r.ok) { closeModal(); loadEvents(); }
        else alert(r.error || "Error");
    });
};

init();
</script>
{% endblock %}
