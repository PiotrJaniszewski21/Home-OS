{% extends "base.html" %}
{% block title %}Login — Home OS{% endblock %}
{% block content %}
<div class="auth-card">
    <div style="text-align: center; margin-bottom: 2rem;">
        <h1 class="text-accent">Home OS</h1>
        <p class="text-secondary text-sm" style="margin-top: 0.25rem;">Sign in to your server</p>
    </div>
    <form method="POST" class="space-y-4">
        {{ form.hidden_tag() }}
        <div>
            <label class="text-secondary text-xs" style="display:block; margin-bottom:0.25rem;">Username</label>
            {{ form.username(class="glass-input") }}
        </div>
        <div>
            <label class="text-secondary text-xs" style="display:block; margin-bottom:0.25rem;">Password</label>
            {{ form.password(class="glass-input") }}
        </div>
        <div class="flex items-center gap-2">
            {{ form.remember_me() }}
            <label class="text-secondary text-sm">Remember me</label>
        </div>
        <button type="submit" class="btn btn-primary w-full" style="justify-content:center; padding: 0.75rem;">
            Sign In
        </button>
    </form>
</div>
{% endblock %}
