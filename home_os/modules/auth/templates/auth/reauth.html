{% extends "base.html" %}
{% block title %}Confirm Identity — Home OS{% endblock %}
{% block content %}
<div class="auth-card">
    <div style="text-align: center; margin-bottom: 2rem;">
        <div style="margin-bottom: 1rem;">
            <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="url(#lock-grad)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <defs><linearGradient id="lock-grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ff9500"/><stop offset="100%" stop-color="#ff3b30"/></linearGradient></defs>
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
        </div>
        <h1>Confirm Identity</h1>
        <p class="text-secondary text-sm" style="margin-top: 0.35rem;">Re-enter your password to continue</p>
    </div>
    <form method="POST" class="space-y-4">
        {{ form.hidden_tag() }}
        <input type="hidden" name="username" value="{{ current_user.username }}">
        <div>
            <label class="text-secondary text-xs font-medium" style="display:block; margin-bottom:0.35rem;">Password</label>
            {{ form.password(class="glass-input", autocomplete="current-password", autofocus="") }}
        </div>
        <button type="submit" class="btn btn-primary w-full" style="padding: 0.7rem; font-size: 14px; font-weight: 600;">
            Continue
        </button>
        <a href="{{ url_for('monitor.dashboard') }}" class="btn btn-ghost w-full" style="display:block; text-align:center; padding:0.5rem; font-size:13px; text-decoration:none;">Cancel</a>
    </form>
</div>
{% endblock %}
